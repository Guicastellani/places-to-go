name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          mkdir _site
          cp index.html style.css script.js firebase-config.js _site/
          cp -r assets _site/
          printf 'window.__env = {\n  FIREBASE_API_KEY: "%s",\n  FIREBASE_AUTH_DOMAIN: "%s",\n  FIREBASE_DATABASE_URL: "%s",\n  FIREBASE_PROJECT_ID: "%s",\n  FIREBASE_STORAGE_BUCKET: "%s",\n  FIREBASE_MESSAGING_SENDER_ID: "%s",\n  FIREBASE_APP_ID: "%s"\n};\n' \
            "$FIREBASE_API_KEY" \
            "$FIREBASE_AUTH_DOMAIN" \
            "$FIREBASE_DATABASE_URL" \
            "$FIREBASE_PROJECT_ID" \
            "$FIREBASE_STORAGE_BUCKET" \
            "$FIREBASE_MESSAGING_SENDER_ID" \
            "$FIREBASE_APP_ID" \
            > _site/env.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
