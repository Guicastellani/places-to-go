name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Overwrite firebase-config.js with real values from GitHub Secrets at deploy time.
      - name: Inject Firebase secrets into firebase-config.js
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          printf 'const firebaseConfig = {\n  apiKey: "%s",\n  authDomain: "%s",\n  databaseURL: "%s",\n  projectId: "%s",\n  storageBucket: "%s",\n  messagingSenderId: "%s",\n  appId: "%s"\n};\n\nfirebase.initializeApp(firebaseConfig);\nwindow.database = firebase.database();\nwindow.firebaseReady = true;\n\nconsole.log("Firebase initialized successfully");\n' \
            "$FIREBASE_API_KEY" \
            "$FIREBASE_AUTH_DOMAIN" \
            "$FIREBASE_DATABASE_URL" \
            "$FIREBASE_PROJECT_ID" \
            "$FIREBASE_STORAGE_BUCKET" \
            "$FIREBASE_MESSAGING_SENDER_ID" \
            "$FIREBASE_APP_ID" \
            > firebase-config.js

      - name: Debug - verify secret injection
        run: |
          echo "databaseURL value length: ${#FIREBASE_DATABASE_URL}"
          cat firebase-config.js
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
